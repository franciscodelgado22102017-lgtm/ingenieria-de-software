<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Ajax</title>
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./wwwroot/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>
    
    <main id="content" class="container pt-5">
        <div class="row">
            <div class="col-12 col-lg-4">
                <div id="contenido-imagen">
                    <img src="./wwwroot/img/woman.png" class="img-fluid" style="height: 400px;">
                </div>
                <div class="d-flex justify-content-between pt-3">
                    <button class="btn btn-outline-success" onclick="resetImage();">
                        <i class="bi bi-arrow-counterclockwise fw-bold fs-5 pe-2"></i>
                        Reiniciar
                    </button>
                    <button class="btn btn-outline-primary" onclick="changeImage();">
                        <i class="bi bi-arrow-left-right fw-bold fs-5 pe-2"></i>
                        Cambiar
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
