<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="col-lg-5 mx-auto p-4 py-md-5">
        <header class="d-flex align-items-center pb-3 mb-5 border-bottom">
            <h2 class="text-success">Formulario de Registro</h2>
        </header>

        <main>
            <h4 class="text-primary mb-4">
                Ejemplo de un registro
            </h4>
            <form action="usuarios.php" method="POST">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" name="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="pwd" required>
                    </div>
                    <div class="col-12">
                        <button class="w-100 btn btn-primary btn-lg" type="submit">Registrar usuario</button>
                    </div>
                </div>
            </form>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
