<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Biblioteca Digital</title>
    <!-- Bootstrap CSS desde ruta local -->
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
    <link href="./wwwroot/css/custom.css" rel="stylesheet">
    <!-- CORREGIDO: usar jQuery 3.7.1 en lugar de 4.0.0 que no existe -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</head>
<body class="bg-gradient">
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white text-center py-4 border-0">
                        <i class="bi bi-journal-bookmark-fill fs-1"></i>
                        <h2 class="mt-2 mb-0">Registro de Usuario</h2>
                        <p class="text-white-50 mb-0">Crea tu cuenta en la Biblioteca Digital</p>
                    </div>
                    
                    <div class="card-body p-5">
                        <form id="form-registro">
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-person-fill me-2"></i>Nombre completo
                                </label>
                                <input type="text" class="form-control form-control-lg" 
                                       id="nombre" placeholder="Tu nombre" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-envelope-fill me-2"></i>Email
                                </label>
                                <input type="email" class="form-control form-control-lg" 
                                       id="email" placeholder="correo@ejemplo.com" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-lock-fill me-2"></i>Contraseña
                                </label>
                                <input type="password" class="form-control form-control-lg" 
                                       id="pwd" placeholder="Mínimo 6 caracteres" required>
                                <div class="form-text">Usa al menos 6 caracteres para mayor seguridad</div>
                            </div>
                            
                            <button class="btn btn-primary btn-lg w-100 rounded-pill" 
                                    type="button" onclick="registroUsuarios();">
                                <i class="bi bi-person-plus-fill me-2"></i>Registrarse
                            </button>
                            
                            <div class="text-center mt-4">
                                <p class="mb-0">¿Ya tienes cuenta? 
                                    <a href="index.html" class="text-decoration-none fw-bold">
                                        Inicia sesión aquí
                                    </a>
                                </p>
                            </div>
                        </form>
                    </div>
                    
                    <div class="card-footer bg-light text-center py-3 border-0">
                        <small class="text-muted">© 2024 Biblioteca Digital - Todos los derechos reservados</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>

    <script src="./wwwroot/js/bootstrap.bundle.min.js"></script>
</body>
</html>
